services:
  db:
    image: mysql:8.4
    container_name: flare-fitness-db
    environment:
      MYSQL_DATABASE: flare_fitness
      MYSQL_USER: flare
      MYSQL_PASSWORD: flare123
      MYSQL_ROOT_PASSWORD: root123
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./db-init/schema_full.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./db-init/product_images_seed.sql:/docker-entrypoint-initdb.d/02-product-images.sql:ro
      - ./db-init/analytics_schema.sql:/docker-entrypoint-initdb.d/03-analytics-schema.sql:ro
      - ./db-init/support_chat_schema.sql:/docker-entrypoint-initdb.d/04-support-chat.sql:ro
      - ./db-init/password_reset_to_username.sql:/docker-entrypoint-initdb.d/05-password-reset.sql:ro
      - ./db-init/promo_hunt_schema.sql:/docker-entrypoint-initdb.d/06-promo-hunt.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    restart: unless-stopped

  app:
    build:
      context: ./backend
    container_name: flare-fitness-app
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/flare_fitness?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: flare
      SPRING_DATASOURCE_PASSWORD: flare123
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      APP_JWT_SECRET: replace-this-secret-with-at-least-32-characters
      APP_CORS_ALLOWED_ORIGINS: http://localhost,http://127.0.0.1
      APP_MAIL_USERNAME: Hoangngocnguyen2006@gmail.com
      APP_MAIL_FROM: Hoangngocnguyen2006@gmail.com
      APP_MAIL_PASSWORD: ${APP_MAIL_PASSWORD:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: flare-fitness-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "20", "1", "--loglevel", "warning"]
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: flare-fitness-nginx
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - "./Front end:/usr/share/nginx/html:ro"
    restart: unless-stopped

volumes:
  mysql-data:
